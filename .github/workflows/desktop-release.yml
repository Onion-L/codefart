name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach DMG to (e.g. v0.2.20)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-desktop:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend deps
        run: cd desktop && npm ci

      - name: Write App Store Connect API key
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          test -n "$APPLE_CERTIFICATE"
          test -n "$APPLE_CERTIFICATE_PASSWORD"
          test -n "$APPLE_API_ISSUER"
          test -n "$APPLE_API_KEY"
          test -n "$APPLE_API_KEY_P8_BASE64"
          mkdir -p "$GITHUB_WORKSPACE/private_keys"
          echo "$APPLE_API_KEY_P8_BASE64" | base64 -D > "$GITHUB_WORKSPACE/private_keys/AuthKey_${APPLE_API_KEY}.p8"

      - name: Build desktop app (universal)
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ github.workspace }}/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
        run: cd desktop && npx tauri build --ci --target universal-apple-darwin

      - name: Locate and attach DMG to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG=$(find target -path '*/bundle/dmg/*.dmg' -not -name '*.blockmap' | head -1)
          echo "Found: $DMG"
          if [ -z "$DMG" ]; then
            echo "No DMG found under target/"
            find target -maxdepth 6 -type f \( -name '*.dmg' -o -name '*.blockmap' \) -print
            exit 1
          fi
          gh release upload "${{ inputs.tag }}" "$DMG" --clobber
