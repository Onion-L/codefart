name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach DMG to (e.g. v0.2.20)'
        required: true
        type: string

jobs:
  build-desktop:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend deps
        run: cd desktop && npm ci

      - name: Build desktop app (universal)
        run: cd desktop && npx tauri build --ci --target universal-apple-darwin

      - name: Locate and attach DMG to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG=$(find desktop/target -path '*/bundle/dmg/*.dmg' -not -name '*.blockmap' | head -1)
          echo "Found: $DMG"
          gh release upload ${{ inputs.tag }} "$DMG" --clobber
