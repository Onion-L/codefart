name: Desktop Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-desktop:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend deps
        run: cd desktop && npm ci

      - name: Build desktop app (universal)
        run: cd desktop && npx tauri build --ci --target universal-apple-darwin

      - name: Rename DMG and upload to release
        run: |
          DMG=$(find desktop/target -path '*/bundle/dmg/*.dmg' | head -1)
          cp "$DMG" CodeFart-macOS.dmg
          gh release upload ${{ github.ref_name }} CodeFart-macOS.dmg --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
